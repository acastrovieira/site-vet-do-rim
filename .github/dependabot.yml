version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /.aiox-core
    schedule:
      interval: monthly
      time: "09:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    groups:
      aiox-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /.aiox-core/scripts/diagnostics/health-dashboard
    schedule:
      interval: monthly
      time: "09:45"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    groups:
      dashboard-minor-patch:
        update-types:
          - minor
          - patch
