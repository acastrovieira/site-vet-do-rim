# Public, non-mutating UI coverage. Authenticated and destructive remote flows remain separate gates.

name: Public UI tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false
    - name: Use Node.js 22
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '22.18.0'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    - name: Verify lockfile supply-chain metadata
      run: node scripts/verify-supply-chain.mjs
    - run: npm ci --no-fund --no-audit
    - run: node node_modules/@playwright/test/cli.js install --with-deps chromium
    - name: Build production artifact
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.placeholder
    - name: Run non-mutating public flows
      run: >
        node node_modules/@playwright/test/cli.js test
        tests/e2e/api-security.spec.ts
        tests/e2e/auth.spec.ts
        tests/e2e/public-smoke.spec.ts
        tests/e2e/public-flows.spec.ts
        tests/e2e/mobile-layout.spec.ts
        tests/e2e/tools-functional.spec.ts
        tests/e2e/seo-metadata.spec.ts
        tests/e2e/accessibility-navigation.spec.ts
        tests/e2e/weight-history-safety.spec.ts
        --project=chromium
        --workers=1
      env:
        NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.placeholder
        PLAYWRIGHT_USE_PRODUCTION_SERVER: '1'

  cross-browser-smoke:
    name: Smoke ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium-tablet-smoke
            browser: chromium
          - project: firefox-smoke
            browser: firefox
          - project: webkit-smoke
            browser: webkit
    defaults:
      run:
        working-directory: web

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false
    - name: Use Node.js 22
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '22.18.0'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    - name: Verify lockfile supply-chain metadata
      run: node scripts/verify-supply-chain.mjs
    - run: npm ci --no-fund --no-audit
    - name: Install ${{ matrix.browser }} runtime
      run: node node_modules/@playwright/test/cli.js install --with-deps ${{ matrix.browser }}
    - name: Run non-mutating browser smoke
      run: node node_modules/@playwright/test/cli.js test tests/e2e/cross-browser-smoke.spec.ts --project=${{ matrix.project }} --workers=1
      env:
        NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.placeholder
